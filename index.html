<script>
    document.addEventListener('DOMContentLoaded', () => {
        showLoader();
        google.script.run.withSuccessHandler(data => {
            hideLoader();
            document.getElementById('currentTheme').textContent = data.theme;
            const savedName = localStorage.getItem('haiku_name');
            if (savedName) {
                document.getElementById('author-name').value = savedName;
            }
        }).withFailureHandler(() => {
            hideLoader();
            showNotification('error', 'お<ruby>題<rt>だい</rt></ruby>の<ruby>読<rt>よ</rt></ruby>み<ruby>込<rt>こ</rt></ruby>みに<ruby>失<rt>しっ</rt>敗<rt>ぱい</rt></ruby>しました。');
        }).getAdminData();
    });

    document.getElementById('haiku-form').addEventListener('submit', event => {
        event.preventDefault();
        const name = document.getElementById('author-name').value.trim();
        const line1 = document.getElementById('line1').value.trim();
        const line2 = document.getElementById('line2').value.trim();
        const line3 = document.getElementById('line3').value.trim();
        if (!name || !line1 || !line2 || !line3) {
            showNotification('error', '<ruby>全<rt>すべ</rt></ruby>ての<ruby>項<rt>こう</rt>目<rt>もく</rt></ruby>を<ruby>入<rt>にゅう</rt>力<rt>りょく</rt></ruby>してください。');
            return;
        }
        showLoader();
        google.script.run.withSuccessHandler(response => {
            hideLoader();
            if (response.success) {
                localStorage.setItem('haiku_name', response.name);
                showNotification('success', '<ruby>投<rt>とう</rt>稿<rt>こう</rt></ruby>しました！ <ruby>作<rt>さく</rt>品<rt>ひん</rt><ruby>広<rt>ひろ</rt>場<rt>ば</rt></ruby>へどうぞ。');
                document.getElementById('haiku-form').reset();
                document.getElementById('author-name').value = response.name;
            } else {
                showNotification('error', '<ruby>投<rt>とう</rt>稿<rt>こう</rt></ruby>に<ruby>失<rt>しっ</rt>敗<rt>ぱい</rt></ruby>しました: ' + response.message);
            }
        }).withFailureHandler(() => {
            hideLoader();
            showNotification('error', '<ruby>通<rt>つう</rt>信<rt>しん</rt></ruby>エラーが<ruby>発<rt>はっ</rt>生<rt>せい</rt></ruby>しました。');
        }).submitHaiku(name, line1, line2, line3);
    });
</script>
