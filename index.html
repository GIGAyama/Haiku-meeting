<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GIGA句会プラザ</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- ★新規追加: 紙吹雪アニメーション用の神ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <!-- 和風フォント -->
  <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Yuji Syuku', serif; background-color: #fdfaf6; color: #333; overflow: hidden; }
    .tanzaku { writing-mode: vertical-rl; text-orientation: upright; border-top: 6px solid #d9534f; }
    ruby { ruby-align: center; ruby-position: over; vertical-align: baseline; line-height: inherit; }
    rt { font-size: 0.55em; color: #64748b; font-family: sans-serif; line-height: 1; user-select: none; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    const runGas = (funcName, ...args) => {
      return new Promise((resolve, reject) => {
        if (typeof google === 'undefined') {
          console.warn(`[Mock] GAS環境外ダミーデータ: ${funcName}`);
          setTimeout(() => {
            switch(funcName) {
              case 'getSettingsData': return resolve({ theme: '春の訪れ', votingStatus: '投票受付中' });
              case 'getPlazaData': return resolve({
                  haikus: [
                    { id: 1, author: 'GIGA太郎', line1: 'さくらちる', line2: 'ランドセルには', line3: 'ゆめいっぱい', score: 3 },
                    { id: 2, author: '花子', line1: 'あたたかい', line2: 'はるのかぜふく', line3: 'こうていで', score: 0 }
                  ],
                  comments: [{haikuId:1, commenter:'先生', comment:'情景が浮かぶね！'}], myVotes: [], settings: { votingStatus: '投票受付中' }
                });
              case 'getAdminDashboardData': return resolve({
                haikus: [{ id: 1, author: 'GIGA太郎', haiku: 'さくらちる ランドセルには ゆめいっぱい', score: 3, isMuted: false }],
                stats: { haikuCount: 24, authorCount: 20, commentsCount: 15, votesCount: 30 },
                settings: { theme: '春の訪れ', votingStatus: '投票受付中' }
              });
              case 'getMyHaikus': return resolve([]);
              case 'getArchiveList': return resolve([]);
              case 'getArchiveData': return resolve([]);
              case 'checkAdminPassword': return resolve(args[0] === '1234');
              default: return resolve({ success: true, name: args[0] || '名無し', message: '成功' });
            }
          }, 500);
          return;
        }
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[funcName](...args);
      });
    };

    const RubyText = ({ text, kana }) => <ruby>{text}<rt>{kana}</rt></ruby>;
    const Skeleton = ({ className }) => <div className={`animate-pulse bg-slate-200/60 rounded-xl ${className}`}></div>;

    const Icons = {
      Home: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      Grid: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>,
      User: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
      Archive: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" /></svg>,
      Settings: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
      Check: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      Close: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      Refresh: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
    };

    const triggerConfetti = () => {
      if (typeof confetti !== 'undefined') {
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#d9534f', '#f59e0b', '#3b82f6', '#10b981'] });
      }
    };

    // =====================================================================
    // App Root
    // =====================================================================
    const App = () => {
      const [currentView, setCurrentView] = useState('home');
      const [toasts, setToasts] = useState([]);
      const [voterId, setVoterId] = useState('');
      const [authorName, setAuthorName] = useState('');
      const [showWelcome, setShowWelcome] = useState(false);

      useEffect(() => {
        let vId = localStorage.getItem('giga_voter_id');
        if (!vId) {
          vId = 'voter_' + Math.random().toString(36).substr(2, 9);
          localStorage.setItem('giga_voter_id', vId);
        }
        setVoterId(vId);
        
        const savedName = localStorage.getItem('giga_author_name');
        if (savedName) setAuthorName(savedName);

        if (!localStorage.getItem('giga_welcome_done')) {
          setShowWelcome(true);
        }
      }, []);

      const closeWelcome = () => {
        localStorage.setItem('giga_welcome_done', 'true');
        setShowWelcome(false);
      };

      const showToast = useCallback((message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      }, []);

      const renderView = () => {
        switch (currentView) {
          case 'home': return <HomeView authorName={authorName} setAuthorName={setAuthorName} showToast={showToast} goTo={setCurrentView} />;
          case 'plaza': return <PlazaView voterId={voterId} authorName={authorName} showToast={showToast} />;
          case 'mypage': return <MyPageView authorName={authorName} showToast={showToast} goTo={setCurrentView} />;
          case 'archives': return <ArchiveView showToast={showToast} />;
          case 'admin': return <AdminView showToast={showToast} />;
          default: return <HomeView />;
        }
      };

      return (
        <div className="h-screen w-full flex flex-col bg-[#fdfaf6] text-slate-800 font-serif selection:bg-blue-200">
          <header className="flex-none bg-white/80 backdrop-blur-md shadow-sm z-40 border-b border-slate-200">
            <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentView('home')}>
                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-[#3c4a6d] to-[#2a3550] flex items-center justify-center text-white shadow-inner">
                  <span className="text-sm font-bold">句</span>
                </div>
                <h1 className="text-xl font-bold tracking-widest text-[#3c4a6d] hidden sm:block">GIGA<RubyText text="句会" kana="くかい"/>プラザ</h1>
              </div>
              <nav className="flex items-center gap-1 sm:gap-2">
                <NavButton active={currentView === 'home'} onClick={() => setCurrentView('home')} icon={<Icons.Home />} label={<RubyText text="投稿" kana="とうこう"/>} />
                <NavButton active={currentView === 'plaza'} onClick={() => setCurrentView('plaza')} icon={<Icons.Grid />} label={<RubyText text="広場" kana="ひろば"/>} />
                <NavButton active={currentView === 'mypage'} onClick={() => setCurrentView('mypage')} icon={<Icons.User />} label={<RubyText text="自分" kana="じぶん"/>} />
                <NavButton active={currentView === 'archives'} onClick={() => setCurrentView('archives')} icon={<Icons.Archive />} label={<RubyText text="過去" kana="かこ"/>} />
                <NavButton active={currentView === 'admin'} onClick={() => setCurrentView('admin')} icon={<Icons.Settings />} label={<RubyText text="先生" kana="せんせい"/>} />
              </nav>
            </div>
          </header>

          <main className="flex-1 overflow-y-auto p-4 md:p-8 relative">
            <div className="max-w-6xl mx-auto">
              {renderView()}
            </div>
          </main>

          <footer className="flex-none w-full text-center text-slate-400 py-4 bg-white border-t border-slate-100 text-sm font-sans">
            <span>© 2026 GIGA句会プラザ <a href="https://note.com/cute_borage86" target="_blank" rel="noopener noreferrer" className="no-underline text-inherit hover:opacity-80 transition-opacity">GIGA山</a></span>
          </footer>

          <div className="fixed bottom-6 right-1/2 translate-x-1/2 sm:translate-x-0 sm:right-6 z-50 flex flex-col gap-2 pointer-events-none w-full max-w-sm px-4">
            {toasts.map(toast => (
              <div key={toast.id} className={`flex items-center gap-3 px-5 py-4 rounded-2xl shadow-xl text-white font-sans font-bold transform transition-all duration-300 ${toast.type === 'success' ? 'bg-[#8BAA7A]' : 'bg-[#d9534f]'}`}>
                {toast.type === 'success' ? <Icons.Check /> : <Icons.Close />}
                <span className="flex-1 text-sm md:text-base">{toast.message}</span>
              </div>
            ))}
          </div>

          {showWelcome && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in font-sans">
              <div className="bg-white p-8 rounded-3xl max-w-md w-full text-center shadow-2xl transform transition-transform scale-100">
                <div className="w-16 h-16 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icons.Home /></div>
                <h2 className="text-2xl font-bold text-slate-800 mb-2">GIGA句会プラザへようこそ！</h2>
                <p className="mb-6 text-slate-600 leading-relaxed">ここでは、みんなの作った俳句を見たり、素敵な作品に投票したりできます。<br/>まずは自分の作品を投稿してみましょう！</p>
                <button onClick={closeWelcome} className="bg-[#3c4a6d] hover:bg-slate-800 text-white px-8 py-4 rounded-xl font-bold w-full transition-colors shadow-lg active:scale-95">さあ、はじめよう！</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const NavButton = ({ active, onClick, icon, label }) => (
      <button onClick={onClick} className={`flex flex-col items-center justify-center w-12 h-14 sm:w-16 sm:h-16 rounded-xl transition-all duration-200 active:scale-95 ${active ? 'bg-[#3c4a6d] text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>
        <div className="mb-0.5">{icon}</div>
        <span className="text-[10px] sm:text-xs font-bold leading-none mt-1">{label}</span>
      </button>
    );

    // =====================================================================
    // 1. ホーム画面（リアルタイムプレビュー修正対応）
    // =====================================================================
    const HomeView = ({ authorName, setAuthorName, showToast, goTo }) => {
      const [settings, setSettings] = useState({ theme: '...', votingStatus: '...' });
      const [lines, setLines] = useState({ line1: '', line2: '', line3: '' });
      const [isSubmitting, setIsSubmitting] = useState(false);

      useEffect(() => { runGas('getSettingsData').then(res => res && setSettings(res)); }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!authorName.trim() || !lines.line1 || !lines.line2 || !lines.line3) return showToast('すべての項目を入力してください', 'error');
        setIsSubmitting(true);
        try {
          const res = await runGas('submitHaiku', authorName, lines.line1, lines.line2, lines.line3);
          if (res && res.success) {
            localStorage.setItem('giga_author_name', authorName);
            showToast('俳句を投稿しました！');
            setLines({ line1: '', line2: '', line3: '' });
            goTo('plaza');
          } else showToast(res?.message || '失敗しました', 'error');
        } catch (err) { showToast('通信エラーが発生しました', 'error'); }
        setIsSubmitting(false);
      };

      const CharCounter = ({ text, target }) => (
        <div className={`text-xs font-sans mt-1 text-right ${text.length > target + 2 ? 'text-red-500 font-bold' : 'text-slate-400'}`}>
          現在 {text.length} 文字 (目安:{target})
        </div>
      );

      return (
        <div className="max-w-5xl mx-auto animate-fade-in flex flex-col md:flex-row gap-8">
          <div className="flex-1">
            <div className="bg-gradient-to-br from-[#3c4a6d] to-[#2a3550] text-white p-6 rounded-3xl shadow-lg text-center mb-6 relative overflow-hidden">
              <h1 className="text-2xl md:text-3xl font-bold mb-3 relative z-10"><RubyText text="俳句" kana="はいく"/>を<RubyText text="投稿" kana="とうこう"/>しよう</h1>
              <div className="bg-white/20 backdrop-blur-sm px-4 py-2 rounded-xl inline-block relative z-10">
                <span className="text-xs opacity-80 mr-2"><RubyText text="今回" kana="こんかい"/>のお<RubyText text="題" kana="だい"/>:</span>
                <span className="text-xl font-bold text-yellow-300">{settings.theme}</span>
              </div>
            </div>

            <form onSubmit={handleSubmit} className="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
              <div className="mb-6">
                <label className="block text-sm font-bold mb-2 text-slate-500 font-sans">あなたの名前</label>
                <input type="text" value={authorName} onChange={e => setAuthorName(e.target.value)} required
                  className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl text-lg focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition" placeholder="ニックネーム" />
              </div>
              <div className="space-y-4 mb-8">
                <label className="block text-sm font-bold text-slate-500 font-sans">俳句 (五・七・五)</label>
                <div>
                  <input type="text" value={lines.line1} onChange={e => setLines({...lines, line1: e.target.value})} required className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl text-lg focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition" placeholder="上の句（ご）" />
                  <CharCounter text={lines.line1} target={5} />
                </div>
                <div>
                  <input type="text" value={lines.line2} onChange={e => setLines({...lines, line2: e.target.value})} required className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl text-lg focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition" placeholder="中の句（しち）" />
                  <CharCounter text={lines.line2} target={7} />
                </div>
                <div>
                  <input type="text" value={lines.line3} onChange={e => setLines({...lines, line3: e.target.value})} required className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl text-lg focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition" placeholder="下の句（ご）" />
                  <CharCounter text={lines.line3} target={5} />
                </div>
              </div>
              <button type="submit" disabled={isSubmitting} className="w-full bg-[#d9534f] hover:bg-[#c9302c] active:scale-[0.98] text-white font-bold text-xl py-5 rounded-2xl shadow-lg transition-all disabled:opacity-50">
                {isSubmitting ? '送信中...' : <><RubyText text="作品" kana="さくひん"/>を<RubyText text="送" kana="おく"/>る</>}
              </button>
            </form>
          </div>

          {/* ★修正ポイント: プレビューの背景幅（w-48）を広げ、名前を枠内に収める */}
          <div className="hidden md:flex flex-col items-center justify-center w-80 bg-slate-100/50 rounded-3xl border-2 border-dashed border-slate-200 p-8">
            <p className="text-sm font-sans font-bold text-slate-400 mb-6">完成プレビュー</p>
            <div className="tanzaku bg-white p-6 rounded-sm shadow-xl h-[400px] w-48 flex items-center justify-center text-2xl leading-loose select-none relative">
              <span className={lines.line1 || lines.line2 || lines.line3 ? 'text-slate-800' : 'text-slate-300'}>
                {lines.line1 || 'うへのく'}<br/>{lines.line2 || 'なかのくをよむ'}<br/>{lines.line3 || 'したのく'}
              </span>
              <span className="absolute bottom-6 left-4 text-sm text-slate-500" style={{writingMode:'vertical-rl'}}>{authorName || 'なまえ'}</span>
            </div>
          </div>
        </div>
      );
    };

    // =====================================================================
    // 2. 広場画面
    // =====================================================================
    const PlazaView = ({ voterId, authorName, showToast }) => {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [isRefreshing, setIsRefreshing] = useState(false);
      const [selectedHaiku, setSelectedHaiku] = useState(null);
      const [sortMode, setSortMode] = useState('newest');

      const loadData = useCallback(async (isRefresh = false) => {
        if (!isRefresh) setLoading(true);
        else setIsRefreshing(true);
        
        try {
          const res = await runGas('getPlazaData', voterId);
          setData(res); 
        } catch(e) {
          showToast('データの取得に失敗しました', 'error');
        }
        setLoading(false);
        setIsRefreshing(false);
      }, [voterId, showToast]);

      useEffect(() => { loadData(); }, [loadData]);

      useEffect(() => {
        if (data && data.settings.votingStatus === '投票締切' && data.haikus.length > 0) {
          triggerConfetti();
        }
      }, [data?.settings?.votingStatus]);

      const sortedHaikus = useMemo(() => {
        if (!data) return [];
        let sorted = [...data.haikus];
        if (sortMode === 'newest') sorted.sort((a, b) => b.id - a.id);
        else if (sortMode === 'random') sorted.sort(() => Math.random() - 0.5);
        return sorted;
      }, [data, sortMode]);

      if (loading && !isRefreshing) return (
        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
          {[...Array(6)].map((_, i) => <Skeleton key={i} className="h-64" />)}
        </div>
      );

      if (!data || !data.settings) return (
        <div className="flex flex-col items-center justify-center py-20 animate-fade-in">
          <p className="text-xl text-slate-500 mb-6 font-sans">データの読み込みに失敗しました。</p>
          <button onClick={() => loadData(false)} className="px-8 py-4 bg-[#3c4a6d] text-white rounded-full font-bold shadow-lg hover:bg-slate-800 transition">もう一度読み込む</button>
        </div>
      );

      const isVotingClosed = data.settings.votingStatus === '投票締切';

      const ResultsArea = () => {
        if (!isVotingClosed || data.haikus.length === 0) return null;
        const sorted = [...data.haikus].sort((a, b) => b.score - a.score);
        const top3Scores = [...new Set(sorted.map(h => h.score))].slice(0, 3);
        
        const renderAward = (score, title, colorClass, borderClass) => {
          const winners = sorted.filter(h => h.score === score && score > 0);
          if (winners.length === 0) return null;
          return (
            <div className={`bg-white p-6 rounded-3xl shadow-xl border-t-8 ${borderClass} transform hover:-translate-y-1 transition-transform`}>
              <h3 className={`text-2xl font-bold mb-4 text-center ${colorClass}`}>{title} ({score}点)</h3>
              {winners.map((w, i) => (
                <div key={i} className="mb-4 text-center border-b border-slate-100 pb-4 last:border-0">
                  <p className="text-xl mb-2">{w.haiku}</p>
                  <p className="text-slate-600 font-bold">{w.publicName || w.author}</p>
                </div>
              ))}
            </div>
          );
        };

        return (
          <div className="mb-12 animate-fade-in-up">
            <h2 className="text-3xl font-bold text-center mb-8 text-[#d9534f]">🎉 <RubyText text="結果発表" kana="けっかはっぴょう" /> 🎉</h2>
            <div className="grid md:grid-cols-3 gap-6 items-end">
               <div className="order-2 md:order-1">{renderAward(top3Scores[1], '🥈 銀賞', 'text-slate-500', 'border-slate-400')}</div>
               <div className="order-1 md:order-2">{renderAward(top3Scores[0], '🥇 金賞', 'text-yellow-600', 'border-yellow-400')}</div>
               <div className="order-3 md:order-3">{renderAward(top3Scores[2], '🥉 銅賞', 'text-amber-800', 'border-amber-700')}</div>
            </div>
          </div>
        );
      };

      return (
        <div className="animate-fade-in">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-4 border-b border-slate-200 pb-4">
            <div>
              <h2 className="text-2xl font-bold mb-2"><RubyText text="作品広場" kana="さくひんひろば"/></h2>
              <div className="text-sm font-bold bg-white px-4 py-1.5 rounded-full shadow-sm inline-block font-sans">
                状態: <span className={isVotingClosed ? 'text-red-500' : 'text-green-600'}>{data.settings.votingStatus}</span>
              </div>
            </div>
            
            <div className="flex items-center gap-2 w-full md:w-auto font-sans">
              {!isVotingClosed && (
                <select value={sortMode} onChange={e => setSortMode(e.target.value)} className="bg-white border border-slate-200 text-sm rounded-xl px-3 py-2 outline-none focus:ring-2 focus:ring-blue-300 flex-1 md:flex-none">
                  <option value="newest">新しい順</option>
                  <option value="random">ランダム</option>
                </select>
              )}
              <button onClick={() => loadData(true)} disabled={isRefreshing} className="bg-white p-2 rounded-xl shadow-sm border border-slate-200 hover:bg-slate-50 text-slate-500 transition active:scale-95 disabled:opacity-50 flex-none">
                <div className={isRefreshing ? 'animate-spin' : ''}><Icons.Refresh /></div>
              </button>
            </div>
          </div>

          <ResultsArea />

          {!isVotingClosed && (
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6">
              {sortedHaikus.map(haiku => (
                <div key={haiku.id} onClick={() => setSelectedHaiku(haiku)}
                  className="tanzaku bg-white p-4 rounded-xl shadow-md cursor-pointer hover:-translate-y-2 hover:shadow-xl transition-all duration-300 h-72 md:h-80 flex items-center justify-center text-xl leading-loose select-none relative group">
                  <div className="absolute inset-0 bg-[#d9534f]/5 opacity-0 group-hover:opacity-100 rounded-xl transition-opacity"></div>
                  {haiku.line1}<br/>{haiku.line2}<br/>{haiku.line3}
                </div>
              ))}
              {sortedHaikus.length === 0 && <p className="col-span-full text-center py-20 text-slate-400 font-sans">まだ作品がありません。</p>}
            </div>
          )}

          {selectedHaiku && (
            <HaikuModal haiku={selectedHaiku} data={data} onClose={() => setSelectedHaiku(null)} voterId={voterId} authorName={authorName} showToast={showToast} reload={() => loadData(true)} />
          )}
        </div>
      );
    };

    const HaikuModal = ({ haiku, data, onClose, voterId, authorName, showToast, reload }) => {
      const [comment, setComment] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);
      
      const isMyHaiku = haiku.author === authorName;
      const isVotingClosed = data.settings.votingStatus === '投票締切';
      const myVotes = data.myVotes || [];
      const comments = data.comments.filter(c => c.haikuId === haiku.id);

      const handleVote = async (score) => {
        setIsSubmitting(true);
        try {
          const res = await runGas('submitVote', haiku.id, score, voterId);
          if (res && res.success) {
            triggerConfetti();
            showToast('投票しました！');
            reload();
            onClose();
          } else showToast(res?.message || '失敗しました', 'error');
        } catch(e) { showToast('通信エラー', 'error'); }
        setIsSubmitting(false);
      };

      const handleComment = async (e) => {
        e.preventDefault();
        if (!comment.trim() || !authorName) return showToast(authorName ? 'コメントを入力してください' : '先に名前を登録してください', 'error');
        setIsSubmitting(true);
        try {
          const res = await runGas('submitComment', haiku.id, comment, authorName);
          if (res && res.success) {
            showToast('コメントしました！');
            setComment('');
            reload();
          } else showToast('失敗しました', 'error');
        } catch(e) { showToast('通信エラー', 'error'); }
        setIsSubmitting(false);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-fade-in" onClick={onClose}>
          <div className="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
            <div className="p-6 md:p-8 flex-1 overflow-y-auto">
              <div className="flex justify-end mb-2">
                <button onClick={onClose} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200"><Icons.Close /></button>
              </div>
              
              <div className="text-center mb-8">
                <p className="text-3xl font-bold leading-relaxed">{haiku.line1}<br/>{haiku.line2}<br/>{haiku.line3}</p>
              </div>

              {!isVotingClosed && !isMyHaiku && (
                <div className="mb-8 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                  <h3 className="text-lg font-bold mb-3 text-center"><RubyText text="投票" kana="とうひょう"/>する</h3>
                  <div className="flex gap-2">
                    {[
                      { s: 3, label: '🥇 金', color: 'bg-yellow-400 hover:bg-yellow-500 text-yellow-900' },
                      { s: 2, label: '🥈 銀', color: 'bg-slate-300 hover:bg-slate-400 text-slate-800' },
                      { s: 1, label: '🥉 銅', color: 'bg-amber-700 hover:bg-amber-800 text-white' }
                    ].map(btn => {
                      const disabled = myVotes.some(v => v.score === btn.s) || myVotes.some(v => v.haikuId === haiku.id) || isSubmitting;
                      return (
                        <button key={btn.s} disabled={disabled} onClick={() => handleVote(btn.s)}
                          className={`flex-1 py-3 rounded-xl font-bold shadow-sm active:scale-95 transition-all ${btn.color} disabled:opacity-40`}>{btn.label}</button>
                      );
                    })}
                  </div>
                </div>
              )}

              <div className="mb-6">
                <h3 className="text-lg font-bold mb-3 border-b-2 border-slate-100 pb-2">みんなのコメント</h3>
                <div className="space-y-3">
                  {comments.length === 0 ? <p className="text-slate-400 text-sm font-sans">まだコメントはありません。</p> :
                   comments.map((c, i) => (
                    <div key={i} className="bg-blue-50/50 p-3 rounded-xl text-sm font-sans">
                      <p className="mb-1">{c.comment}</p>
                      <p className="text-right text-xs text-slate-500">- {c.commenter}</p>
                    </div>
                  ))}
                </div>
              </div>

              {!isVotingClosed && !isMyHaiku && (
                <form onSubmit={handleComment} className="flex gap-2">
                  <input type="text" value={comment} onChange={e => setComment(e.target.value)} placeholder="やさしい言葉をおくろう"
                    className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 font-sans focus:outline-none focus:ring-2 focus:ring-blue-300" />
                  <button type="submit" disabled={isSubmitting} className="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold disabled:opacity-50">送信</button>
                </form>
              )}
            </div>
          </div>
        </div>
      );
    };

    // =====================================================================
    // 3. マイページ & 4. 過去の句会
    // =====================================================================
    const MyPageView = ({ authorName, showToast, goTo }) => {
      const [haikus, setHaikus] = useState([]);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        if (!authorName) return setLoading(false);
        runGas('getMyHaikus', authorName).then(data => { if(data) setHaikus(data); setLoading(false); }).catch(() => { showToast('取得失敗', 'error'); setLoading(false); });
      }, [authorName, showToast]);

      if (!authorName) return (
        <div className="text-center py-20"><p className="text-xl mb-6">まだ名前が登録されていません。</p><button onClick={() => goTo('home')} className="bg-[#3c4a6d] text-white px-8 py-4 rounded-full font-bold shadow-lg">投稿画面へ</button></div>
      );
      if (loading) return <Skeleton className="h-64" />;

      return (
        <div className="max-w-3xl mx-auto animate-fade-in">
          <h2 className="text-3xl font-bold mb-2 text-center"><RubyText text="自分" kana="じぶん"/>の<RubyText text="作品" kana="さくひん"/></h2>
          <p className="text-center text-slate-500 mb-8">{authorName} さんの記録</p>
          <div className="space-y-4">
            {haikus.length === 0 ? <p className="text-center bg-white p-8 rounded-2xl shadow">まだ作品がありません。</p> :
             haikus.map(h => (
              <details key={h.id} className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden group">
                <summary className="p-6 cursor-pointer list-none flex justify-between items-center hover:bg-slate-50 transition-colors">
                  <div>
                    <span className="text-xs text-blue-600 font-bold bg-blue-50 px-2 py-1 rounded-md">{h.kukaiName}</span>
                    <p className="text-2xl font-bold mt-2">{h.haiku}</p>
                  </div>
                  <div className="flex items-center gap-4">
                    <span className="text-2xl font-bold text-yellow-600">{h.score}<span className="text-sm">点</span></span>
                    <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center group-open:rotate-180 transition-transform">
                      <svg className="w-5 h-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
                    </div>
                  </div>
                </summary>
                <div className="p-6 bg-slate-50 border-t border-slate-100">
                  <h4 className="font-bold mb-3 text-slate-700">もらったコメント</h4>
                  <ul className="space-y-2 font-sans">
                    {h.comments.map((c, i) => (<li key={i} className="bg-white p-3 rounded-lg border border-slate-200 text-sm">{c.comment} <span className="text-slate-400 ml-2">- {c.commenter}</span></li>))}
                  </ul>
                </div>
              </details>
            ))}
          </div>
        </div>
      );
    };

    const ArchiveView = ({ showToast }) => {
      const [archives, setArchives] = useState([]);
      const [selected, setSelected] = useState(null);
      const [haikus, setHaikus] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        runGas('getArchiveList').then(list => { if(list) setArchives(list); setLoading(false); }).catch(() => { showToast('取得失敗', 'error'); setLoading(false); });
      }, [showToast]);

      const loadArchive = async (name) => {
        setLoading(true); setSelected(name);
        try { const data = await runGas('getArchiveData', name); if(data) setHaikus(data); } catch(e) { showToast('取得失敗', 'error'); }
        setLoading(false);
      };

      if (loading && archives.length === 0) return <Skeleton className="h-64" />;

      return (
        <div className="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto animate-fade-in">
          <div className="md:col-span-1 bg-white p-4 rounded-3xl shadow-sm border border-slate-100 h-fit">
            <h2 className="text-xl font-bold mb-4 px-2 border-b-2 border-slate-100 pb-2"><RubyText text="開催" kana="かいさい"/>リスト</h2>
            <div className="space-y-2 max-h-[60vh] overflow-y-auto">
              {archives.length === 0 ? <p className="text-sm text-slate-500 p-2">過去の記録はありません。</p> :
               archives.map(a => (
                  <button key={a} onClick={() => loadArchive(a)} className={`w-full text-left px-4 py-3 rounded-xl transition-colors font-sans text-sm font-bold ${selected === a ? 'bg-[#3c4a6d] text-white shadow-md' : 'bg-slate-50 hover:bg-slate-100 text-slate-700'}`}>
                    {a.replace('俳句_', '').replace('_', ' ').replace(/-/g, '/')}
                  </button>
              ))}
            </div>
          </div>
          <div className="md:col-span-2 bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100">
            {selected ? (
              <>
                <h3 className="text-2xl font-bold mb-6 text-[#3c4a6d]">{selected.replace('俳句_', '')} の作品</h3>
                {loading ? <Skeleton className="h-32 mb-4" /> : (
                  <div className="grid sm:grid-cols-2 gap-4">
                    {haikus.map((h, i) => (
                      <div key={i} className="bg-slate-50 p-5 rounded-2xl border-l-4 border-[#3c4a6d]">
                        <p className="text-xl font-bold mb-3">{h.haiku}</p>
                        <p className="text-right text-sm text-slate-500 font-sans">{h.publicName}</p>
                      </div>
                    ))}
                  </div>
                )}
              </>
            ) : <div className="h-full flex flex-col items-center justify-center text-slate-400 py-20"><Icons.Archive /><p className="mt-4">左のリストから選択</p></div>}
          </div>
        </div>
      );
    };

    // =====================================================================
    // 5. 先生用管理ページ
    // =====================================================================
    const AdminView = ({ showToast }) => {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [password, setPassword] = useState('');
      const [dashData, setDashData] = useState(null);
      const [newPass, setNewPass] = useState('');
      const [isProcessing, setIsProcessing] = useState(false);

      const loadDashboard = async () => {
        const data = await runGas('getAdminDashboardData');
        if(data) setDashData(data);
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        setIsProcessing(true);
        const valid = await runGas('checkAdminPassword', password);
        if (valid) {
          setIsLoggedIn(true);
          await loadDashboard();
        } else showToast('パスワードが違います', 'error');
        setIsProcessing(false);
      };

      const handleUpdateSettings = async (field, value) => {
        setIsProcessing(true);
        const res = await runGas('updateSettings', field === 'theme' ? value : dashData.settings.theme, field === 'votingStatus' ? value : dashData.settings.votingStatus);
        if (res && res.success) { showToast('設定を更新しました'); await loadDashboard(); } 
        else showToast('失敗しました', 'error');
        setIsProcessing(false);
      };

      const handleToggleMute = async (haikuId, currentMute) => {
        if (!confirm(currentMute ? 'ミュートを解除し、広場に再表示しますか？' : 'この作品を広場から隠しますか？（削除はされません）')) return;
        setIsProcessing(true);
        const res = await runGas('toggleMuteHaiku', haikuId, !currentMute);
        if (res && res.success) { showToast('表示状態を変更しました'); await loadDashboard(); }
        else showToast('失敗しました', 'error');
        setIsProcessing(false);
      };

      const handleReset = async () => {
        if (!confirm('本当に新しい句会を準備しますか？\n（現在のデータは過去の記録として保存されます）')) return;
        setIsProcessing(true);
        const res = await runGas('resetKukai');
        if (res && res.success) { showToast(res.message); await loadDashboard(); } 
        else showToast('失敗しました', 'error');
        setIsProcessing(false);
      };

      const handleChangePass = async (e) => {
        e.preventDefault();
        setIsProcessing(true);
        const res = await runGas('changeAdminPassword', password, newPass);
        if(res && res.success){ showToast(res.message); setPassword(newPass); setNewPass(''); } 
        else showToast('失敗しました', 'error');
        setIsProcessing(false);
      };

      if (!isLoggedIn) return (
        <div className="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl mt-10 font-sans">
          <h2 className="text-2xl font-bold text-center mb-6">先生用 管理画面</h2>
          <form onSubmit={handleLogin} className="space-y-4">
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} required placeholder="パスワード（初期値: 1234）" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none" />
            <button type="submit" disabled={isProcessing} className="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-md transition">{isProcessing ? '確認中...' : '入室する'}</button>
          </form>
        </div>
      );

      if (!dashData) return <Skeleton className="h-64" />;

      const StatCard = ({ label, value, max=40, color="bg-blue-500" }) => {
        const percent = Math.min(100, (value / max) * 100);
        return (
          <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 font-sans">
            <p className="text-sm text-slate-500 font-bold mb-1">{label}</p>
            <div className="flex items-end gap-2 mb-2">
              <span className="text-3xl font-black text-slate-800">{value}</span>
            </div>
            <div className="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
              <div className={`h-full ${color} transition-all duration-1000`} style={{ width: `${percent}%` }}></div>
            </div>
          </div>
        );
      };

      return (
        <div className="max-w-4xl mx-auto space-y-8 animate-fade-in font-sans">
          <div className="flex justify-between items-end mb-6">
            <h2 className="text-3xl font-bold font-serif text-slate-800">管理ダッシュボード</h2>
            <button onClick={loadDashboard} disabled={isProcessing} className="text-sm bg-white border border-slate-200 px-4 py-2 rounded-lg shadow-sm hover:bg-slate-50">↻ 最新の情報に更新</button>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <StatCard label="参加児童数 (人)" value={dashData.stats.authorCount} max={40} color="bg-green-500" />
            <StatCard label="総投稿数 (句)" value={dashData.stats.haikuCount} max={120} color="bg-blue-500" />
            <StatCard label="総投票数 (票)" value={dashData.stats.votesCount} max={120} color="bg-yellow-400" />
            <StatCard label="コメント数 (件)" value={dashData.stats.commentsCount} max={200} color="bg-purple-500" />
          </div>
          
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h3 className="text-xl font-bold mb-4 border-b pb-2">現在の設定</h3>
            <div className="flex gap-4 mb-4">
              <input type="text" value={dashData.settings.theme} onChange={e => setDashData({...dashData, settings: {...dashData.settings, theme: e.target.value}})} className="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400" />
              <button onClick={() => handleUpdateSettings('theme', dashData.settings.theme)} disabled={isProcessing} className="bg-blue-600 hover:bg-blue-700 text-white px-6 font-bold rounded-xl disabled:opacity-50">お題を更新</button>
            </div>
            <div className="flex gap-4">
               <button onClick={() => handleUpdateSettings('votingStatus', '投票受付中')} disabled={isProcessing || dashData.settings.votingStatus === '投票受付中'} className="flex-1 py-3 rounded-xl font-bold border-2 border-green-500 text-green-700 hover:bg-green-50 disabled:bg-green-500 disabled:text-white transition">投票を受付する</button>
               <button onClick={() => handleUpdateSettings('votingStatus', '投票締切')} disabled={isProcessing || dashData.settings.votingStatus === '投票締切'} className="flex-1 py-3 rounded-xl font-bold border-2 border-red-500 text-red-700 hover:bg-red-50 disabled:bg-red-500 disabled:text-white transition">投票を締め切る</button>
            </div>
          </div>

          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h3 className="text-xl font-bold mb-4 border-b pb-2">投稿された作品一覧（セーフティ）</h3>
            <p className="text-sm text-slate-500 mb-4">不適切な作品の「👁️」ボタンを押すと、子供たちの広場から非表示にできます。</p>
            <div className="space-y-2 max-h-96 overflow-y-auto">
              {dashData.haikus.length === 0 ? <p className="text-slate-400">まだ作品がありません</p> : 
                dashData.haikus.map(h => (
                <div key={h.id} className={`flex justify-between items-center p-3 rounded-xl border ${h.isMuted ? 'bg-slate-100 border-slate-200 opacity-60' : 'bg-slate-50 border-slate-200'}`}>
                  <div>
                    <span className="text-xs bg-slate-200 px-2 py-1 rounded-md font-bold mr-2">{h.author}</span>
                    <span className={`text-lg font-serif ${h.isMuted ? 'line-through' : ''}`}>{h.haiku}</span>
                  </div>
                  <button onClick={() => handleToggleMute(h.id, h.isMuted)} disabled={isProcessing}
                    className={`px-4 py-2 rounded-lg font-bold text-sm transition-colors ${h.isMuted ? 'bg-slate-300 text-slate-700' : 'bg-red-100 text-red-600 hover:bg-red-200'}`}>
                    {h.isMuted ? '非表示中 (戻す)' : '👁️ 隠す'}
                  </button>
                </div>
              ))}
            </div>
          </div>

          <div className="grid md:grid-cols-2 gap-6">
            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
              <h3 className="text-xl font-bold mb-4 text-red-600 border-b pb-2">次回の句会の準備</h3>
              <button onClick={handleReset} disabled={isProcessing} className="w-full bg-red-100 text-red-700 hover:bg-red-200 font-bold py-4 rounded-xl transition disabled:opacity-50">新しい句会を準備する</button>
            </div>
            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
               <h3 className="text-xl font-bold mb-4 border-b pb-2">パスワードの変更</h3>
               <form onSubmit={handleChangePass} className="flex gap-4">
                  <input type="password" value={newPass} onChange={e => setNewPass(e.target.value)} placeholder="新パスワード" required className="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" />
                  <button type="submit" disabled={isProcessing} className="bg-slate-800 text-white px-6 font-bold rounded-xl disabled:opacity-50">変更</button>
               </form>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    tailwind.config = {
      theme: { extend: { animation: { 'fade-in': 'fadeIn 0.3s ease-out forwards', 'fade-in-up': 'fadeInUp 0.5s ease-out forwards' }, keyframes: { fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }, fadeInUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } } } }
    }
  </script>
</body>
</html>
