<body class="p-4 md:p-8">

    <?!= HtmlService.createHtmlOutputFromFile('ui_components').getContent(); ?>

    <div class="max-w-4xl mx-auto">
        <header class="header-gradient text-white p-6 rounded-2xl shadow-xl text-center mb-8">
            <h1 class="text-3xl md:text-5xl font-bold"><ruby>過去<rt>かこ</rt></ruby>の<ruby>句会<rt>くかい</rt></ruby></h1>
            <p class="mt-2 text-xl">アーカイブ</p>
        </header>

        <main class="grid md:grid-cols-3 gap-8">
            <!-- 句会リスト -->
            <aside id="archive-list-container" class="md:col-span-1 bg-white/80 p-6 rounded-2xl shadow-lg">
                <h2 class="text-2xl font-bold mb-4 border-b-2 pb-2"><ruby>開催<rt>かいさい</rt></ruby>リスト</h2>
                <div id="archive-list" class="space-y-2">
                    <!-- ここに過去の句会リストが表示されます -->
                </div>
            </aside>

            <!-- 俳句表示エリア -->
            <section id="haiku-display-area" class="md:col-span-2 bg-white/80 p-6 rounded-2xl shadow-lg">
                <h2 id="selected-kukai-title" class="text-2xl font-bold mb-4">リストから<ruby>句会<rt>くかい</rt></ruby>を<ruby>選択<rt>せんたく</rt></ruby>してください</h2>
                <div id="haiku-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- ここに選択された句会の俳句が表示されます -->
                </div>
            </section>
        </main>
        
        <nav class="text-center mt-12">
             <a href="<?= url ?>?page=index" target="_top" class="bg-purple-700 hover:bg-purple-800 text-white font-bold py-3 px-8 rounded-full transition shadow-lg hover:shadow-xl transform hover:-translate-y-1">トップページへもどる</a>
        </nav>
    </div>

<script>
    window.addEventListener('load', () => {
        showLoader();
        google.script.run.withSuccessHandler(archiveNames => {
            hideLoader();
            renderArchiveList(archiveNames);
        }).withFailureHandler(err => {
            hideLoader();
            showNotification('error', '<ruby>過去<rt>かこ</rt></ruby>の<ruby>句会<rt>くかい</rt></ruby>の読み込みに失敗しました。');
        }).getArchivedKukaiList();
    });

    function renderArchiveList(names) {
        const listContainer = document.getElementById('archive-list');
        if (names.length === 0) {
            listContainer.innerHTML = '<p>アーカイブされた<ruby>句会<rt>くかい</rt></ruby>はありません。</p>';
            return;
        }

        listContainer.innerHTML = names.map(name => {
            // "俳句_2024-01-01_12-34" -> "2024年01月01日 12:34"
            const formattedName = name.replace('俳句_', '')
                                      .replace('_', ' ')
                                      .replace('-', '年')
                                      .replace('-', '月')
                                      .replace(' ', '日 ')
                                      .replace(':', '時') + '分';
            return `<button onclick="loadArchiveHaiku('${name}')" class="w-full text-left p-3 rounded-lg hover:bg-gray-200 transition">${formattedName}</button>`;
        }).join('');
    }

    function loadArchiveHaiku(archiveName) {
        showLoader();
        google.script.run.withSuccessHandler(response => {
            hideLoader();
            if (response.success) {
                renderHaikuGrid(archiveName, response.haikus);
            } else {
                showNotification('error', response.message);
            }
        }).withFailureHandler(err => {
            hideLoader();
            showNotification('error', '俳句の読み込みに失敗しました。');
        }).getArchivedKukaiData(archiveName);
    }

    function renderHaikuGrid(archiveName, haikus) {
        const formattedName = archiveName.replace('俳句_', '').replace('_', ' ');
        document.getElementById('selected-kukai-title').textContent = `${formattedName} の作品`;
        
        const gridContainer = document.getElementById('haiku-grid');
        if (haikus.length === 0) {
            gridContainer.innerHTML = '<p>この<ruby>句会<rt>くかい</rt></ruby>には投稿がありませんでした。</p>';
            return;
        }

        gridContainer.innerHTML = haikus.map(h => `
            <div class="bg-white p-4 rounded-lg shadow-md border-l-4 border-blue-800">
                <p class="text-xl font-bold mb-2">${h.haiku}</p>
                <p class="text-sm text-right text-gray-600">（${h.author} さん）</p>
            </div>
        `).join('');
    }
</script>
</body>
</html>
