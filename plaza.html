                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-5 rounded-full shadow-md transition"><ruby>送<rt>そう</rt>信<rt>しん</rt></ruby></button>

<script>
    let currentHaikuId = null;
    let voterId = localStorage.getItem('voter_id');
    if (!voterId) {
        voterId = 'voter_' + Date.now() + Math.random();
        localStorage.setItem('voter_id', voterId);
    }
    const savedName = localStorage.getItem('haiku_name');

    function loadData() {
        showLoader();
        google.script.run.withSuccessHandler(response => {
            hideLoader();
            renderPage(response);
        }).withFailureHandler(err => {
            hideLoader();
            showNotification('error', 'データの<ruby>読<rt>よ</rt></ruby>み<ruby>込<rt>こ</rt></ruby>みに<ruby>失<rt>しっ</rt>敗<rt>ぱい</rt></ruby>しました。');
        }).getKukaiData(voterId);
    }

    function renderPage(data) {
        document.getElementById('currentTheme').textContent = data.theme;
        const isVotingClosed = data.votingStatus === '投票締切';
        let votingStatusText = data.votingStatus === '投票受付中' ?
            '<ruby>投<rt>とう</rt>票<rt>ひょう</rt><ruby>受<rt>うけ</rt>付<rt>つけ</rt>中<rt>ちゅう</rt></ruby>' :
            '<ruby>投<rt>とう</rt>票<rt>ひょう</rt><ruby>締<rt>しめ</rt>切<rt>きり</rt></ruby>';
        document.getElementById('voting-status').innerHTML = `（${votingStatusText}）`;

        if (isVotingClosed) {
            document.getElementById('haiku-list-area').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            renderResults(data.haikus);
        } else {
            document.getElementById('haiku-list-area').classList.remove('hidden');
            document.getElementById('result-area').classList.add('hidden');
            renderHaikuGrid(data.haikus);
        }
    }

    function renderResults(haikus) {
        const ranks = { 1: [], 2: [], 3: [] };
        const uniqueScores = [...new Set(haikus.map(h => h.score))].sort((a, b) => b - a).slice(0, 3);
        
        haikus.forEach(h => {
            const rank = uniqueScores.indexOf(h.score) + 1;
            if (rank >= 1 && rank <= 3) {
                ranks[rank].push(h);
            }
        });

        const createAwardHtml = (award, color, haikuList) => {
            if (haikuList.length === 0) return `<h3 class="text-3xl font-bold mb-4">${award}</h3><p class="text-gray-500"><ruby>該<rt>がい</rt>当<rt>とう</rt><ruby>作<rt>さく</rt>品<rt>ひん</rt></ruby>なし</p>`;
            return `
                <h3 class="text-4xl font-bold mb-4" style="color: ${color};">${award}</h3>
                ${haikuList.map(h => `
                    <div class="mb-4">
                        <p class="text-3xl leading-relaxed">${h.haiku}</p>
                        <p class="text-xl text-gray-700 mt-2"><strong><ruby>作<rt>さく</rt>者<rt>しゃ</rt></ruby>:</strong> ${h.name}</p>
                        <p class="text-2xl font-bold mt-1" style="color: ${color};">${h.score} <ruby>点<rt>てん</rt></ruby></p>
                    </div>
                `).join('<hr class="my-3">')}
            `;
        };

        document.getElementById('gold-award').innerHTML = createAwardHtml('🥇 <ruby>金<rt>きん</rt>賞<rt>しょう</rt></ruby>', '#D97706', ranks[1]);
        document.getElementById('silver-award').innerHTML = createAwardHtml('🥈 <ruby>銀<rt>ぎん</rt>賞<rt>しょう</rt></ruby>', '#6B7280', ranks[2]);
        document.getElementById('bronze-award').innerHTML = createAwardHtml('🥉 <ruby>銅<rt>どう</rt>賞<rt>しょう</rt></ruby>', '#92400E', ranks[3]);
    }

    function renderHaikuGrid(haikus) {
        const grid = document.getElementById('haiku-grid');
        grid.innerHTML = '';
        haikus.forEach(haiku => {
            const card = document.createElement('div');
            card.className = 'haiku-card bg-white p-4 rounded-lg shadow-md flex items-center justify-center';
            card.innerText = `${haiku.line1}\n${haiku.line2}\n${haiku.line3}`;
            card.onclick = () => openModal(haiku.id);
            grid.appendChild(card);
        });
    }

    function openModal(haikuId) {
        currentHaikuId = haikuId;
        showLoader();
        google.script.run.withSuccessHandler(data => {
            hideLoader();
            const haiku = data.haikus.find(h => h.id === haikuId);
            if (!haiku) return;

            document.getElementById('modal-haiku').innerHTML = `${haiku.line1}<br>${haiku.line2}<br>${haiku.line3}`;
            
            const isMyHaiku = haiku.author === savedName;
            const isVotingClosed = data.votingStatus === '投票締切';

            document.getElementById('modal-vote-section').style.display = (!isVotingClosed && !isMyHaiku) ? 'block' : 'none';
            document.getElementById('comment-section').style.display = (!isVotingClosed && !isMyHaiku) ? 'block' : 'none';

            if (!isMyHaiku) {
                updateVoteButtons(data.myVotes);
            }

            document.getElementById('haiku-modal').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-content').classList.remove('scale-95', 'opacity-0');
            }, 10);
        }).getKukaiData(voterId);
    }
    
    function closeModal() {
        document.getElementById('modal-content').classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
            document.getElementById('haiku-modal').classList.add('hidden');
        }, 300);
    }

    function updateVoteButtons(myVotes) {
        const buttons = document.querySelectorAll('.vote-btn');
        buttons.forEach(btn => {
            const score = btn.dataset.score;
            btn.disabled = false;
            const awardName = {3:'🥇 <ruby>金<rt>きん</rt>賞<rt>しょう</rt></ruby>', 2:'🥈 <ruby>銀<rt>ぎん</rt>賞<rt>しょう</rt></ruby>', 1:'🥉 <ruby>銅<rt>どう</rt>賞<rt>しょう</rt></ruby>'}[score];
            btn.innerHTML = awardName;
            
            if (myVotes.find(v => v.score == score)) {
                btn.disabled = true;
                btn.innerHTML = '<ruby>投<rt>とう</rt>票<rt>ひょう</rt></ruby>しました！';
            }
            if (myVotes.find(v => v.haikuId == currentHaikuId)) {
                btn.disabled = true;
            }
        });
    }

    function submitVote(score) {
        showLoader();
        google.script.run.withSuccessHandler(response => {
            hideLoader();
            if (response.success) {
                showNotification('success', '<ruby>投<rt>とう</rt>票<rt>ひょう</rt></ruby>しました！');
                loadData();
                closeModal();
            } else {
                showNotification('error', response.message || '<ruby>投<rt>とう</rt>票<rt>ひょう</rt></ruby>に<ruby>失<rt>しっ</rt>敗<rt>ぱい</rt></ruby>しました。');
            }
        }).withFailureHandler(err => {
            hideLoader();
            showNotification('error', '<ruby>通<rt>つう</rt>信<rt>しん</rt></ruby>エラーが<ruby>発<rt>はっ</rt>生<rt>せい</rt></ruby>しました。');
        }).submitVote(currentHaikuId, score, voterId);
    }

    function postComment(event) {
        event.preventDefault();
        const input = document.getElementById('comment-input');
        const comment = input.value.trim();
        if (!comment) {
            showNotification('error', 'コメントを<ruby>入<rt>にゅう</rt>力<rt>りょく</rt></ruby>してください。');
            return;
        }
        if (!savedName) {
            showNotification('error', 'コメントするには、<ruby>先<rt>さき</rt></ruby>に<ruby>俳<rt>はい</rt>句<rt>く</rt></ruby>を<ruby>投<rt>とう</rt>稿<rt>こう</rt></ruby>して<ruby>名<rt>な</rt>前<rt>まえ</rt></ruby>を<ruby>登<rt>とう</rt>録<rt>ろく</rt></ruby>してください。');
            return;
        }
        showLoader();
        google.script.run.withSuccessHandler(response => {
            hideLoader();
            if (response.success) {
                showNotification('success', 'コメントを<ruby>投<rt>とう</rt>稿<rt>こう</rt></ruby>しました。');
                input.value = '';
                closeModal();
            } else {
                showNotification('error', 'コメントの<ruby>投<rt>とう</rt>稿<rt>こう</rt></ruby>に<ruby>失<rt>しっ</rt>敗<rt>ぱい</rt></ruby>しました。');
            }
        }).withFailureHandler(err => {
            hideLoader();
            showNotification('error', '<ruby>通<rt>つう</rt>信<rt>しん</rt></ruby>エラーが<ruby>発<rt>はっ</rt>生<rt>せい</rt></ruby>しました。');
        }).submitComment(currentHaikuId, comment, savedName);
    }

    document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.addEventListener('click', () => submitVote(parseInt(btn.dataset.score)));
    });
    
    document.getElementById('comment-form').addEventListener('submit', postComment);
    
    window.addEventListener('load', loadData);
    setInterval(loadData, 60000);
</script>
