                <p class="mb-4">このボタンを押すと、今回の句会のデータ（俳句、コメント、投票）が保存され、次の句会のためにアプリがリセットされます。<strong class="text-red-700">この操作は元に戻せません。</strong></p>

                    <button id="reset-kukai-btn" class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-3 rounded-lg shadow-md transition">

<script>
    let currentSettings = {};

    document.getElementById('login-form').addEventListener('submit', event => {
        event.preventDefault();
        const password = document.getElementById('password').value;
        showLoader();
        google.script.run.withSuccessHandler(isValid => {
            hideLoader();
            if (isValid) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadAdminData();
            } else {
                showNotification('error', 'パスワードが違います。');
            }
        }).checkAdminPassword(password);
    });

    function loadAdminData() {
        showLoader();
        google.script.run.withSuccessHandler(data => {
            hideLoader();
            currentSettings = data;
            document.getElementById('current-theme').textContent = data.theme;
            document.getElementById('current-status').textContent = data.votingStatus;
            document.getElementById('new-theme').value = data.theme;
        }).getAdminData();
    }

    function updateSettings(newTheme, newStatus) {
        showLoader();
        google.script.run.withSuccessHandler(response => {
            hideLoader();
            if(response.success) {
                showNotification('success', '設定を更新しました。');
                loadAdminData();
            } else {
                showNotification('error', '設定の更新に失敗しました。');
            }
        }).updateAdminSettings(newTheme, newStatus);
    }

    document.getElementById('update-theme-btn').addEventListener('click', () => {
        const newTheme = document.getElementById('new-theme').value;
        updateSettings(newTheme, currentSettings.votingStatus);
    });

    document.getElementById('start-voting-btn').addEventListener('click', () => {
        updateSettings(currentSettings.theme, '投票受付中');
    });

    document.getElementById('end-voting-btn').addEventListener('click', () => {
        updateSettings(currentSettings.theme, '投票締切');
    });
    
    document.getElementById('export-csv-btn').addEventListener('click', () => {
        showLoader();
        google.script.run.withSuccessHandler(csvData => {
            hideLoader();
            if (csvData.startsWith('エラー:')) {
                showNotification('error', 'エクスポートに失敗しました: ' + csvData);
                return;
            }
            const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            const date = new Date().toISOString().slice(0, 10);
            link.setAttribute("download", `句会結果_${date}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showNotification('success', 'CSVファイルをダウンロードしました。');
        }).withFailureHandler(() => {
            hideLoader();
            showNotification('error', 'エクスポートに失敗しました。');
        }).exportHaikuData();
    });

    // ★新機能：パスワード変更フォームの処理
    document.getElementById('password-change-form').addEventListener('submit', event => {
        event.preventDefault();
        const currentPassword = document.getElementById('current-password').value;
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (newPassword !== confirmPassword) {
            showNotification('error', '新しいパスワードが一致しません。');
            return;
        }
        
        if (!newPassword || newPassword.length < 4) {
            showNotification('error', '新しいパスワードは4文字以上にしてください。');
            return;
        }

        showLoader();
        google.script.run.withSuccessHandler(response => {
            hideLoader();
            if (response.success) {
                showNotification('success', response.message);
                document.getElementById('password-change-form').reset(); // フォームをリセット
            } else {
                showNotification('error', response.message);
            }
        }).withFailureHandler(err => {
            hideLoader();
            showNotification('error', '通信エラーが発生しました。');
        }).updateAdminPassword(currentPassword, newPassword);
    });

    const resetConfirmationArea = document.getElementById('reset-confirmation-area');
    document.getElementById('reset-kukai-btn').addEventListener('click', () => {
        resetConfirmationArea.innerHTML = `
            <p class="text-center font-bold text-red-700 mb-2">ほんとうにリセットしますか？</p>
            <div class="flex gap-4">
                <button id="confirm-reset-btn" class="flex-1 bg-red-700 hover:bg-red-800 text-white font-bold py-3 rounded-lg">はい、リセットします</button>
                <button id="cancel-reset-btn" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded-lg">いいえ</button>
            </div>
        `;

        document.getElementById('confirm-reset-btn').addEventListener('click', () => {
            showLoader();
            google.script.run.withSuccessHandler(response => {
                hideLoader();
                if(response.success) {
                    showNotification('success', response.message);
                    resetConfirmationArea.innerHTML = '<p class="text-center text-green-700 font-bold">リセットが完了しました。</p>';
                } else {
                    showNotification('error', response.message);
                }
            }).resetKukaiData();
        });

        document.getElementById('cancel-reset-btn').addEventListener('click', () => {
             resetConfirmationArea.innerHTML = `
                <button id="reset-kukai-btn" class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-3 rounded-lg shadow-md transition">
                    新しい句会を準備する
                </button>
            `;
            document.getElementById('reset-kukai-btn').addEventListener('click', arguments.callee.caller);
        });
    });

</script>
