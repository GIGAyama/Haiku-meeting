    <div id="login-screen" class="max-w-md mx-auto">
        <header class="header-gradient text-white p-6 rounded-2xl shadow-xl text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold">管理ページ</h1>
        </header>
        <main class="bg-white/80 p-8 rounded-2xl shadow-lg">
            <h2 class="text-2xl font-bold mb-4 text-center">ログイン</h2>
            <p class="text-center mb-6">パスワードを入力してください</p>
            <form id="login-form">
                <input type="password" id="password" class="w-full p-3 border-2 border-gray-300 rounded-lg text-lg focus:ring-2 focus:ring-blue-500" required>
                <button type="submit" class="action-btn w-full mt-6 text-white font-bold text-xl py-3 rounded-full shadow-lg transform hover:-translate-y-1 transition">
                    入室する
                </button>
            </form>
        </main>
    </div>

    <div id="admin-panel" class="hidden max-w-2xl mx-auto">
        <header class="header-gradient text-white p-6 rounded-2xl shadow-xl text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold">句会 管理ページ</h1>
        </header>
        <main class="bg-white/80 p-8 rounded-2xl shadow-lg space-y-8">
            <div>
                <h2 class="text-2xl font-bold mb-3">現在の設定</h2>
                <div class="bg-white p-4 rounded-lg shadow-inner">
                    <p><strong>お題:</strong> <span id="current-theme"></span></p>
                    <p><strong>投票状況:</strong> <span id="current-status"></span></p>
                </div>
            </div>

            <div>
                <h2 class="text-2xl font-bold mb-3">お題の設定</h2>
                <div class="flex gap-2">
                    <input type="text" id="new-theme" class="flex-grow p-3 border-2 border-gray-300 rounded-lg text-lg focus:ring-2 focus:ring-blue-500">
                    <button id="update-theme-btn" class="action-btn text-white font-bold py-3 px-6 rounded-lg shadow-md transition">更新</button>
                </div>
            </div>

            <div>
                <h2 class="text-2xl font-bold mb-3">投票の管理</h2>
                <div class="flex gap-4">
                    <button id="start-voting-btn" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md transition">投票 受付中 にする</button>
                    <button id="end-voting-btn" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded-lg shadow-md transition">投票 締切 にする</button>
                </div>
            </div>

            <!-- ★新機能：句会リセット機能 -->
            <div class="border-t-2 border-dashed pt-8">
                <h2 class="text-2xl font-bold mb-3 text-red-800">次回の句会の準備</h2>
                <p class="mb-4">このボタンを押すと、今回の句会のデータ（俳句、コメント、投票）が保存され、次の句会のためにアプリがリセットされます。<strong class="text-red-700">この操作は元に戻せません。</strong></p>
                <div id="reset-confirmation-area">
                    <button id="reset-kukai-btn" class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-3 rounded-lg shadow-md transition">
                        新しい句会を準備する
                    </button>
                </div>
            </div>

        </main>
    </div>

<script>
    let currentSettings = {};

    document.getElementById('login-form').addEventListener('submit', event => {
        event.preventDefault();
        const password = document.getElementById('password').value;
        showLoader();
        google.script.run.withSuccessHandler(isValid => {
            hideLoader();
            if (isValid) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadAdminData();
            } else {
                showNotification('error', 'パスワードが違います。');
            }
        }).checkAdminPassword(password);
    });

    function loadAdminData() {
        showLoader();
        google.script.run.withSuccessHandler(data => {
            hideLoader();
            currentSettings = data;
            document.getElementById('current-theme').textContent = data.theme;
            document.getElementById('current-status').textContent = data.votingStatus;
            document.getElementById('new-theme').value = data.theme;
        }).getAdminData();
    }

    function updateSettings(newTheme, newStatus) {
        showLoader();
        google.script.run.withSuccessHandler(response => {
            hideLoader();
            if(response.success) {
                showNotification('success', '設定を更新しました。');
                loadAdminData();
            } else {
                showNotification('error', '設定の更新に失敗しました。');
            }
        }).updateAdminSettings(newTheme, newStatus);
    }

    document.getElementById('update-theme-btn').addEventListener('click', () => {
        const newTheme = document.getElementById('new-theme').value;
        updateSettings(newTheme, currentSettings.votingStatus);
    });

    document.getElementById('start-voting-btn').addEventListener('click', () => {
        updateSettings(currentSettings.theme, '投票受付中');
    });

    document.getElementById('end-voting-btn').addEventListener('click', () => {
        updateSettings(currentSettings.theme, '投票締切');
    });

    // ★新機能：リセットボタンの処理
    const resetConfirmationArea = document.getElementById('reset-confirmation-area');
    document.getElementById('reset-kukai-btn').addEventListener('click', () => {
        // 確認用のボタンを表示
        resetConfirmationArea.innerHTML = `
            <p class="text-center font-bold text-red-700 mb-2">ほんとうにリセットしますか？</p>
            <div class="flex gap-4">
                <button id="confirm-reset-btn" class="flex-1 bg-red-700 hover:bg-red-800 text-white font-bold py-3 rounded-lg">はい、リセットします</button>
                <button id="cancel-reset-btn" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded-lg">いいえ</button>
            </div>
        `;

        // 「はい」ボタンの処理
        document.getElementById('confirm-reset-btn').addEventListener('click', () => {
            showLoader();
            google.script.run.withSuccessHandler(response => {
                hideLoader();
                if(response.success) {
                    showNotification('success', response.message);
                    // ボタンを元に戻す
                    resetConfirmationArea.innerHTML = '<p class="text-center text-green-700 font-bold">リセットが完了しました。</p>';
                } else {
                    showNotification('error', response.message);
                }
            }).resetKukaiData();
        });

        // 「いいえ」ボタンの処理
        document.getElementById('cancel-reset-btn').addEventListener('click', () => {
             resetConfirmationArea.innerHTML = `
                <button id="reset-kukai-btn" class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-3 rounded-lg shadow-md transition">
                    新しい句会を準備する
                </button>
            `;
            // イベントリスナーを再設定する必要がある
            document.getElementById('reset-kukai-btn').addEventListener('click', arguments.callee.caller);
        });
    });

</script>
</body>
</html>
